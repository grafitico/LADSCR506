<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Los Ángeles Detailing Store CR">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EBEF"/>
      <stop offset="50%" stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#6c7178"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2196F3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Shield -->
  <path d="M100 10 L180 35 L180 120 Q180 180 100 210 Q20 180 20 120 L20 35 Z"
        fill="url(#shieldGrad)" stroke="url(#metalGrad)" stroke-width="4"/>
  <path d="M100 10 L180 35 L180 120 Q180 180 100 210 Q20 180 20 120 L20 35 Z"
        fill="none" stroke="#2196F3" stroke-width="1" opacity="0.4"/>

  <!-- Glow under polisher -->
  <circle cx="100" cy="125" r="55" fill="url(#glow)"/>

  <!-- Car silhouette -->
  <path d="M45 85 Q60 70 90 70 L110 70 Q140 70 155 85 L150 95 L50 95 Z"
        fill="url(#metalGrad)" opacity="0.95"/>
  <path d="M62 78 L92 78 L88 88 L58 88 Z M108 78 L138 78 L142 88 L112 88 Z"
        fill="#0D1B2A" opacity="0.5"/>

  <!-- Polisher body -->
  <rect x="80" y="115" width="50" height="22" rx="4" fill="#1c1f24"/>
  <rect x="125" y="118" width="35" height="16" rx="8" fill="#2196F3"/>
  <circle cx="105" cy="155" r="22" fill="url(#metalGrad)" stroke="#0D1B2A" stroke-width="2"/>
  <circle cx="105" cy="155" r="14" fill="#FF6A00"/>
  <circle cx="105" cy="155" r="14" fill="none" stroke="#0D1B2A" stroke-width="2"/>

  <!-- Water drops -->
  <path d="M50 50 q-4 6 0 10 q4 -4 0 -10z" fill="#2196F3" opacity="0.85"/>
  <path d="M70 35 q-3 5 0 8 q3 -3 0 -8z" fill="#2196F3" opacity="0.85"/>
  <path d="M155 50 q-3 5 0 8 q3 -3 0 -8z" fill="#2196F3" opacity="0.85"/>
  <path d="M140 175 q-3 5 0 8 q3 -3 0 -8z" fill="#2196F3" opacity="0.85"/>

  <!-- Sparkles -->
  <g fill="#FFFFFF" opacity="0.95">
    <path d="M40 110 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2z"/>
    <path d="M165 110 l1.5 4 l4 1.5 l-4 1.5 l-1.5 4 l-1.5 -4 l-4 -1.5 l4 -1.5z"/>
    <path d="M85 195 l1.5 3.5 l3.5 1.5 l-3.5 1.5 l-1.5 3.5 l-1.5 -3.5 l-3.5 -1.5 l3.5 -1.5z"/>
  </g>
</svg>
